name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - run: npm --prefix server ci
      - run: npm --prefix server run check
      - run: npm --prefix server run test:sqlite

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: splint
          POSTGRES_PASSWORD: splint_test
          POSTGRES_DB: splint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm --prefix server ci
      - run: npm --prefix server run migrate:postgres
        env:
          DATABASE_URL: postgresql://splint:splint_test@localhost:5432/splint_test
      - run: npm --prefix server run test:postgres
        env:
          DATABASE_URL: postgresql://splint:splint_test@localhost:5432/splint_test
